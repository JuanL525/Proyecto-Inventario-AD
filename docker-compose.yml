version: '3.8'

services:
  db-master:
    image: mysql:8.0
    container_name: db-master
    restart: always
    command: --server-id=1 --log-bin=mysql-bin --binlog-do-db=inventario_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventario_db
    ports:
      - "3307:3306"
    volumes:
      - ./db/master/my-master.cnf:/etc/mysql/conf.d/my-master.cnf
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - master_data:/var/lib/mysql
    networks:
      - db-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 60s

  db-slave1:
    image: mysql:8.0
    container_name: db-slave1
    restart: always
    command: --server-id=2 --relay-log=relay-bin --read-only=1
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    volumes:
      - ./db/slave1/my-slave1.cnf:/etc/mysql/conf.d/my-slave1.cnf
      - slave1_data:/var/lib/mysql
    depends_on:
      - db-master
    networks:
      - db-net

  db-slave2:
    image: mysql:8.0
    container_name: db-slave2
    restart: always
    command: --server-id=3 --relay-log=relay-bin --read-only=1
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3309:3306"
    volumes:
      - ./db/slave2/my-slave2.cnf:/etc/mysql/conf.d/my-slave2.cnf
      - slave2_data:/var/lib/mysql
    depends_on:
      - db-master
    networks:
      - db-net

  backend:
    build: ./backend
    container_name: app-backend
    environment:
      - DB_HOST=db-master
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=inventario_db
      - DB_SLAVE_HOST=db-slave1
      - HOSTNAME=backend
    depends_on:
      db-master:
        condition: service_healthy
    networks:
      - db-net

  backend-1:
    build: ./backend
    container_name: app-backend-1
    environment:
      - DB_HOST=db-master
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=inventario_db
      - DB_SLAVE_HOST=db-slave2
      - HOSTNAME=backend-1
    depends_on:
      - db-master
    networks:
      - db-net

  backend-2:
    build: ./backend
    container_name: app-backend-2
    environment:
      - DB_HOST=db-master
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=inventario_db
      - DB_SLAVE_HOST=db-slave1
      - HOSTNAME=backend-2
    depends_on:
      - db-master
    networks:
      - db-net

  nginx:
    image: nginx:alpine
    container_name: app-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - backend-1
      - backend-2
    networks:
      - db-net

  frontend:
    build: ./frontend
    container_name: app-frontend
    ports:
      - "5173:5173"
    depends_on:
      - nginx
    networks:
      - db-net

volumes:
  master_data:
  slave1_data:
  slave2_data:

networks:
  db-net:
    driver: bridge
